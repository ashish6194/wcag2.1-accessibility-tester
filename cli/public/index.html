<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WCAG 2.1 Accessibility Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#60a5fa" stroke-width="2"/><path d="M9 14.5l3 3 7-7" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h1>WCAG 2.1 Tester</h1>
      </div>
      <div class="header-actions">
        <button id="historyToggle" class="btn btn-ghost">History</button>
        <button id="exportJsonBtn" class="btn btn-ghost" disabled>Export JSON</button>
        <button id="exportCsvBtn" class="btn btn-ghost" disabled>Export CSV</button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Scan Controls -->
    <section class="scan-section">
      <div class="scan-card">
        <div class="scan-input-row">
          <input type="url" id="urlInput" placeholder="Enter URL to test (e.g., https://example.com)" autocomplete="url" />
          <button id="scanBtn" class="btn btn-primary">
            <span id="scanBtnText">Scan</span>
            <svg id="scanSpinner" class="spinner hidden" width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="30" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" values="0 9 9;360 9 9" dur="0.8s" repeatCount="indefinite"/></circle></svg>
          </button>
        </div>
        <div class="scan-options">
          <span class="options-label">Levels:</span>
          <label><input type="checkbox" id="lvlA" checked> A</label>
          <label><input type="checkbox" id="lvlAA" checked> AA</label>
          <label><input type="checkbox" id="lvlAAA" checked> AAA</label>
          <span class="divider"></span>
          <label><input type="checkbox" id="lvlBP" checked> Best Practices</label>
        </div>
      </div>
    </section>

    <!-- Progress -->
    <div id="progress" class="progress hidden">
      <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
      <span id="progressText">Scanning...</span>
    </div>

    <!-- Results Container -->
    <div id="resultsContainer" class="hidden">
      <!-- Score + Summary Row -->
      <section class="score-summary-row">
        <div class="score-card">
          <canvas id="scoreGauge" width="160" height="160"></canvas>
          <div class="score-info">
            <span id="scoreValue" class="score-value">0</span>
            <span id="gradeText" class="grade-text">—</span>
          </div>
        </div>
        <div class="summary-cards">
          <div class="s-card s-violations">
            <span class="s-count" id="sViolations">0</span>
            <span class="s-label">Violations</span>
          </div>
          <div class="s-card s-incomplete">
            <span class="s-count" id="sIncomplete">0</span>
            <span class="s-label">Needs Review</span>
          </div>
          <div class="s-card s-passed">
            <span class="s-count" id="sPassed">0</span>
            <span class="s-label">Passed</span>
          </div>
          <div class="s-card s-na">
            <span class="s-count" id="sNA">0</span>
            <span class="s-label">N/A</span>
          </div>
        </div>
      </section>

      <!-- Engine Stats -->
      <section id="engineStats" class="engine-stats">
        <div class="engine-chip" id="engAxe"><span class="engine-dot" style="background:#3b82f6"></span> axe-core: <strong id="engAxeVal">—</strong></div>
        <div class="engine-chip" id="engPa11y"><span class="engine-dot" style="background:#8b5cf6"></span> pa11y: <strong id="engPa11yVal">—</strong></div>
        <div class="engine-chip" id="engLH"><span class="engine-dot" style="background:#ea580c"></span> Lighthouse: <strong id="engLHVal">—</strong></div>
        <div class="engine-chip" id="engCustom"><span class="engine-dot" style="background:#16a34a"></span> Custom: <strong id="engCustomVal">—</strong></div>
      </section>

      <!-- Charts -->
      <section class="charts-row">
        <div class="chart-card">
          <h3>Impact Distribution</h3>
          <canvas id="impactChart" width="280" height="200"></canvas>
        </div>
        <div class="chart-card">
          <h3>WCAG Level Breakdown</h3>
          <canvas id="levelChart" width="280" height="200"></canvas>
        </div>
      </section>

      <!-- Tabs + Results -->
      <section class="results-section">
        <nav class="tabs">
          <button class="tab active" data-tab="violations">Violations</button>
          <button class="tab" data-tab="incomplete">Needs Review</button>
          <button class="tab" data-tab="passes">Passed</button>
        </nav>
        <div id="rulesList" class="rules-list"></div>
      </section>
    </div>

    <!-- History Sidebar -->
    <aside id="historySidebar" class="history-sidebar hidden">
      <div class="sidebar-header">
        <h3>Scan History</h3>
        <button id="clearHistoryBtn" class="btn btn-ghost btn-sm">Clear</button>
        <button id="closeHistoryBtn" class="btn btn-ghost btn-sm">Close</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </aside>
  </main>

  <!-- Error Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
